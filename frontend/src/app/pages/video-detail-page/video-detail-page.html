
<app-header></app-header>
<body>
<div id="content">
  <aside class="sidebar">
    <div class="sidebarContainer">
      <div *ngFor="let video of sidebarVideos" class="video-card">
        <div class="thumbnailContainer">
          <img [src]="getSafeThumbnailUrl(video.id)" alt="miniaturka">
        </div>
        <div class="video-info">
          <h3>{{video?.title}}</h3>
          <p>{{video.views || 0}} wyświetleń </p>
        </div>
      </div>
    </div>

  </aside>
  <div id="video-info">
  <div class="video-container">
    <video
    controls width="50%" crossorigin="use-credentials" [src]="videoUrl">
    </video>
  </div>
    <div id="video-meta">
      <div class="video-title">
      <h1>{{this.videoData.title}}</h1>
      </div>
      <div class="channelMeta">
        <div class="channelInfo">
          <h3>{{this.videoData.channel.name}}</h3>
          <p>{{this.videoData.channel.subscribers}} Subskrybentów</p>
        </div>
        <button class="sub-button" (click)="subscribe()">Subskrybuj</button>
        <div class="video-actions">
          <div class="like-dislike-container">
            <button class="action-btn like-btn"
                    [class.active-like]="userReaction === 'LIKE'"
                    (click)="handleReaction(videoData.id, 'LIKE')">
              <span class="icon">👍</span>
              <span class="count">{{videoData?.likes|| 0}}</span>
            </button>

            <div class="divider"></div>

            <button class="action-btn dislike-btn"
                    [class.active-dislike]="userReaction === 'DISLIKE'"
                    (click)="handleReaction(videoData.id, 'DISLIKE')">
              <span class="icon">👎</span>
              <span class="count">{{videoData.dislikes || 0}}</span>
            </button>
          </div>
          <div class="addToPlaylist-btn">
            <button (click)="openAddToPlaylistDialog(myDialog)">Dodaj to playlisty</button>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>
<ng-template #myDialog>
  <h2 mat-dialog-title>Dodaj do playlisty</h2>

  <mat-dialog-content>
    <p>Wybierz Playliste</p>
    <select [(ngModel)]="selectedPlaylist" name="options">
      <option [ngValue]="null" disabled>-- Wybierz z listy --</option>
      <option *ngFor="let playlist of playlists" [ngValue]="playlist">
        {{playlist.playlistName}}
      </option>
    </select>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog()">Anuluj</button>
    <button mat-raised-button color="primary" (click)="addVideoToPlaylist(videoData.id,selectedPlaylist.id)" >Dodaj do playlisty</button>
  </mat-dialog-actions>
</ng-template>

</body>
