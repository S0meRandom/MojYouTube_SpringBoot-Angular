<body>
<div class="form-container">
  <form id="login-form" >
    <h2>Zaloguj się</h2>
    <p>Witaj z powrotem</p>
    <div id="msg" *ngIf="loginError">
      <label>Logowanie nie powiodło się!</label>
    </div>
    <div class="form-group">
      <label>Użytkownik</label>
      <input type="text" id="username" name="username" [(ngModel)]="login" required>
    </div>
    <div class="form-group">
      <label>Hasło</label>
      <input type="password" id="password" name="password" [(ngModel)]="password">
    </div>
    <button (click)="Login()" class="log-btn">Wejdź</button>
    <div class="footer">
      Nie masz konta? <a routerLink="/register" class="link-style">Stwórz je!</a>
    </div>

  </form>
</div>
</body>
